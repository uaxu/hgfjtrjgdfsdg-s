<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #000;
      color: #ff0000;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }
    .card {
      background: #000;
      border: 2px solid #8a0002;
      border-radius: 12px;
      padding: 4rem 2rem;
      max-width: 900px;
      text-align: center;
      box-shadow: 0 0 30px #8a0002;
      margin-bottom: 3rem;
      width: 100%;
      position: relative;
      z-index: 2;
    }
    .link-card {
      width: 20%;
      height: auto;
      background: #000;
      border: 1px solid rgba(220, 38, 38, 0.5);
      border-radius: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      box-shadow: 0 0 15px #8a0002;
      text-decoration: none;
      color: inherit;
      padding: 1rem 0.5rem;
    }
    .link-card:hover {
      transform: scale(1.05);
    }
    .link-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    footer {
      margin-top: auto;
      padding: 3rem 0 1.5rem;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      position: relative;
      z-index: 2;
    }
    .snowflake {
      position: absolute;
      top: -10px;
      color: #8a0002;
      user-select: none;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 1;
    }
    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }
    @media (max-width: 900px) {
      .link-card {
        width: 45%;
      }
    }
    /* Estilos para os campos */
    .input-field {
      width: 80%;
      max-width: 400px;
      padding: 1rem;
      text-align: center;
      background: #000;
      border: 1px solid rgba(220, 38, 38, 0.5);
      border-radius: 0.75rem;
      color: #ff0000;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      box-shadow: 0 0 15px #8a0002;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: #ff0000;
      box-shadow: 0 0 30px #8a0002;
      transform: scale(1.02);
    }
    .input-field::placeholder {
      color: #444;
      letter-spacing: 1px;
    }
    .btn-login {
      width: 80%;
      max-width: 400px;
      padding: 1rem;
      background: #000;
      border: 1px solid rgba(220, 38, 38, 0.5);
      border-radius: 0.75rem;
      color: #ff0000;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px #8a0002;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .btn-login:hover:not(:disabled) {
      transform: scale(1.05);
      background: rgba(138, 0, 2, 0.1);
      box-shadow: 0 0 30px #8a0002;
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    #error-msg {
      min-height: 2rem;
      margin-top: 0.5rem;
    }
    /* Imagem do topo - centralizada e maior */
    .top-logo {
      width: 360px;
      height: 360px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 0.5rem;
      display: block;
    }
    /* Imagens dos cards - sem borda vermelha */
    .link-card img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      object-fit: cover;
      margin-bottom: 0.75rem;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/whbf.png" alt="WHBF" class="top-logo">
    <h1 class="text-5xl tracking-widest">WHBF DMS</h1>
    <p class="text-xl mb-6 text-red-400 leading-relaxed">
      Discord Portuguese Server Message Searcher
    </p>
    
    <div class="link-row" style="margin-top: 0; flex-direction: column; gap: 1.5rem; align-items: center;">
      <input id="email" type="email" placeholder="email" class="input-field">
      <input id="password" type="password" placeholder="pswd" class="input-field">
      <button id="btn-login" class="btn-login">
        Login
      </button>
      <p id="error-msg" class="text-red-500 text-center"></p>
    </div>
  </div>

  <div class="card">
    <p class="text-gray-500 mb-10 text-sm tracking-widest">- Information -</p>
      <div class="link-row">
        <a href="https://whbf.cc/" target="_blank" class="link-card">
          <img src="/assets/whbf.png" alt="WHBF">
          <div class="text-lg font-bold text-red-500">WHBF</div>
          <div class="text-xs text-gray-400 mt-1">Main Website</div>
        </a>

      <a href="https://www.roblox.com/communities/703659855/WHBF#!/about" target="_blank" class="link-card">
        <img src="/assets/whbf.png" alt="WHBF Roblox">
        <div class="text-lg font-bold text-red-500">WHBF Roblox</div>
        <div class="text-xs text-gray-400 mt-1">Main Roblox Group</div>
      </a>

      <a href="https://discord.com/invite/fm7pSzyAT6" target="_blank" class="link-card">
        <img src="/assets/whbf.png" alt="WHBF Center">
        <div class="text-lg font-bold text-red-500">WHBF Center</div>
        <div class="text-xs text-gray-400 mt-1">Discord Server</div>
      </a>
      
      <a href="https://t.me/whbfcc" target="_blank" class="link-card">
        <img src="/assets/whbf.png" alt="WHBF Telegram">
        <div class="text-lg font-bold text-red-500">WHBF Telegram</div>
        <div class="text-xs text-gray-400 mt-1">Telegram Channel</div>
      </a>
    </div>
  </div>

  <footer>
    © 2026 whbf.cc
  </footer>

  <!-- Falling snowflakes -->
  <script>
    const flakes = [];
    let lastTime = performance.now();

    function createParticle() {
      const p = document.createElement('div');
      p.className = 'snowflake';
      p.style.left = Math.random() * window.innerWidth + 'px';
      p.style.fontSize = Math.random() * 14 + 6 + 'px';
      p.innerText = '❆';

      document.body.appendChild(p);

      flakes.push({
        el: p,
        y: -10,
        speed: Math.random() * 200 + 300
      });
    }

    function update(time) {
      let delta = (time - lastTime) / 1000;

      if (delta > 0.1) delta = 0.1;

      lastTime = time;

      if (Math.random() < delta * 50) {
        createParticle();
      }

      flakes.forEach((flake, i) => {
        flake.y += flake.speed * delta;

        flake.el.style.transform = `translateY(${flake.y}px)`;

        if (flake.y > window.innerHeight + 560) {
          flake.el.remove();
          flakes.splice(i, 1);
        }
      });

      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDXX5y50eUHJtFNa4S4r5LrBoPXpUKeGBQ",
      authDomain: "gsrgszsgz.firebaseapp.com",
      projectId: "gsrgszsgz",
      storageBucket: "gsrgszsgz.firebasestorage.app",
      messagingSenderId: "896231461425",
      appId: "1:896231461425:web:f5e1692a5d727ff1ed7b10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("btn-login");
    const errorMsg = document.getElementById("error-msg");

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") loginBtn.click();
      });
    });

    loginBtn.onclick = async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        errorMsg.textContent = "Mete o email e a senha correta caralho";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "⏳ ...";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "/dashboard";
      } catch (error) {
        let errorMessage = "Falha no login";
        if (error.code === 'auth/invalid-email') errorMessage = "E-mail inválido";
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          errorMessage = "E-mail ou senha incorretos";
        }
        if (error.code === 'auth/too-many-requests') errorMessage = "Muitas tentativas – aguarde";
        if (error.code === 'auth/network-request-failed') errorMessage = "Erro de rede – verifique sua conexão";

        errorMsg.textContent = errorMessage;
        console.error("Firebase error:", error);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    };

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener("input", () => {
        errorMsg.textContent = "";
      });
    });
  </script>

  <script>

    setInterval(() => {

  </script>
</body>
</html>
