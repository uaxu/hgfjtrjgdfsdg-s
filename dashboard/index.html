<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHBF DMS - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #000;
      color: #ff0000;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }
    .dashboard-container {
      background: #000;
      border: 2px solid #8a0002;
      border-radius: 12px;
      padding: 3rem 2rem;
      max-width: 1200px;
      width: 100%;
      box-shadow: 0 0 30px #8a0002;
      position: relative;
      z-index: 2;
    }
    input, button {
      background: #000;
      border: 1px solid #8a0002;
      color: #ff0000;
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    input:focus {
      outline: none;
      border-color: #ff4d4d;
    }
    button {
      cursor: pointer;
      transition: all 0.2s;
      font-weight: bold;
    }
    button:hover {
      background: #1a0000;
      transform: scale(1.02);
    }
    .btn-red {
      background: #000;
      border: 1px solid #8a0002;
      color: #ff0000;
    }
    .btn-red:hover {
      background: #330000;
    }
    footer {
      margin-top: auto;
      padding: 3rem 0 1.5rem;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      position: relative;
      z-index: 2;
    }
    .snowflake {
      position: absolute;
      top: -10px;
      color: #8a0002;
      user-select: none;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 1;
    }
    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }
    .search-counter {
      background: rgba(0,0,0,0.8);
      border: 1px solid #8a0002;
      border-radius: 8px;
      padding: 0.8rem 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #ff0000;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }
    .search-counter span {
      font-weight: bold;
      color: #ff4444;
    }
    .admin-section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #8a0002;
      display: none;
    }
    .admin-section .admin-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      justify-content: center;
    }
    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }
    .btn-gray {
      border-color: #444;
      color: #888;
    }
    .btn-gray:hover {
      background: #111;
    }
    /* ===== RESULTADOS ===== */
    #results {
      background: rgba(0,0,0,0.6);
      border: 1px solid #8a0002;
      border-radius: 8px;
      padding: 1rem;
      min-height: 400px;
      max-height: 70vh;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #results::-webkit-scrollbar {
      width: 8px;
    }
    #results::-webkit-scrollbar-track {
      background: #0a0a0a;
      border-radius: 4px;
    }
    #results::-webkit-scrollbar-thumb {
      background: #8a0002;
      border-radius: 4px;
    }
    .msg-card {
      background: rgba(20, 0, 0, 0.5);
      border: 1px solid rgba(138, 0, 2, 0.3);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      transition: all 0.2s ease;
    }
    .msg-card:hover {
      border-color: #8a0002;
      background: rgba(30, 0, 0, 0.6);
      transform: translateX(4px);
    }
    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8a0002, #330000);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      border: 2px solid #8a0002;
      margin-right: 0.8rem;
      flex-shrink: 0;
    }
    .msg-author {
      color: #ff4444;
      font-weight: bold;
    }
    .msg-date {
      color: #666;
      font-size: 0.7rem;
    }
    .msg-content {
      color: #ddd;
      margin-top: 0.3rem;
      padding: 0.3rem 0.5rem;
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
      border-left: 2px solid #8a0002;
    }
    .msg-badge {
      font-size: 0.6rem;
      padding: 0.15rem 0.6rem;
      border-radius: 12px;
      background: #1a3300;
      color: #66ff66;
      border: 1px solid #336600;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: #444;
      text-align: center;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
    .empty-state h3 { color: #666; font-size: 1.2rem; }
    .empty-state p { font-size: 0.85rem; color: #333; }
    #result-info { text-align: right; margin-top: 0.8rem; color: #444; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-4xl">Pesquisador de Mensagens</h1>
      <div class="flex gap-3 items-center">
        <span id="user-email" class="text-gray-400 text-sm hidden md:inline"></span>
        <button id="btn-logout" class="bg-gray-800 hover:bg-gray-700 text-white px-6 py-2 rounded">Sair</button>
      </div>
    </div>

    <!-- CONTADOR -->
    <div class="search-counter">
      🔍 Buscas restantes hoje: <span id="search-remaining">--</span> / <span id="search-limit">50</span>
      <span id="search-status" style="display:none; margin-left:1rem; color:#ff0000;">🚫 LIMITE ATINGIDO</span>
    </div>

    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="author-id" type="text" placeholder="ID do autor (ex: 123456789012345678)"
             class="flex-1 bg-black border border-red-700 rounded px-5 py-4 text-lg focus:outline-none focus:border-red-400">
      <input id="keyword" type="text" placeholder="Palavra-chave (opcional)"
             class="flex-1 bg-black border border-red-700 rounded px-5 py-4 text-lg focus:outline-none focus:border-red-400">
      <button id="btn-search" class="btn-red px-10 py-4 text-lg">Pesquisar</button>
    </div>

    <div id="results">
      <div class="empty-state">
        <div class="icon">📨</div>
        <h3>Nenhuma mensagem ainda</h3>
        <p>Digite um ID de autor e clique em Pesquisar</p>
      </div>
    </div>
    <p id="result-info" class="text-right mt-4 text-gray-400 text-sm"></p>

    <!-- ADMIN -->
    <div id="admin-section" class="admin-section">
      <p class="text-gray-500 text-sm tracking-widest text-center mb-3">— Administração —</p>
      <div class="admin-row">
        <input id="admin-email" type="email" placeholder="Email do usuário" class="bg-black">
        <input id="admin-tier" placeholder="Tier (normal/premium/admin)" class="bg-black" style="width:150px;">
        <button id="btn-set-tier" class="btn-red btn-small">Definir Tier</button>
        <button id="btn-reset-user" class="btn-red btn-small btn-gray">Resetar Buscas</button>
      </div>
    </div>
  </div>

  <footer>© 2026 whbf.cc</footer>

  <!-- NEVE -->
  <script>
    function createSnowflake() {
      const flake = document.createElement('div');
      flake.className = 'snowflake';
      flake.style.left = Math.random() * 100 + 'vw';
      flake.style.fontSize = Math.random() * 14 + 8 + 'px';
      flake.style.animationDuration = Math.random() * 6 + 8 + 's';
      flake.innerText = '❆';
      document.body.appendChild(flake);
      setTimeout(() => flake.remove(), 15000);
    }
    setInterval(createSnowflake, 180);
  </script>

  <script>
    const titles = ["2","23","238","2382","23826","2382","238","23"];
    let tIndex = 0;
    setInterval(() => {
      document.title = titles[tIndex];
      tIndex = (tIndex + 1) % titles.length;
    }, 500);
  </script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
    import { 
      getFirestore, 
      doc, 
      getDoc, 
      setDoc, 
      updateDoc, 
      increment, 
      collection, 
      query, 
      where, 
      getDocs,
      runTransaction
    } from "firebase/firestore";

    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
      apiKey: "AIzaSyDXX5y50eUHJtFNa4S4r5LrBoPXpUKeGBQ",
      authDomain: "gsrgszsgz.firebaseapp.com",
      projectId: "gsrgszsgz",
      storageBucket: "gsrgszsgz.firebasestorage.app",
      messagingSenderId: "896231461425",
      appId: "1:896231461425:web:f5e1692a5d727ff1ed7b10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ========== CONFIGURAÇÕES ==========
    const RATE_LIMIT_MS = 5000;
    let lastSearchTime = 0;
    let currentUser = null;
    let isAdmin = false;

    // ========== ELEMENTOS DOM ==========
    const authorInput = document.getElementById('author-id');
    const keywordInput = document.getElementById('keyword');
    const searchBtn = document.getElementById('btn-search');
    const resultsDiv = document.getElementById('results');
    const infoP = document.getElementById('result-info');
    const logoutBtn = document.getElementById('btn-logout');
    const searchRemaining = document.getElementById('search-remaining');
    const searchLimitEl = document.getElementById('search-limit');
    const searchStatus = document.getElementById('search-status');
    const userEmailEl = document.getElementById('user-email');
    const adminSection = document.getElementById('admin-section');
    const adminEmail = document.getElementById('admin-email');
    const adminTier = document.getElementById('admin-tier');
    const setTierBtn = document.getElementById('btn-set-tier');
    const resetUserBtn = document.getElementById('btn-reset-user');

    // ========== FUNÇÕES FIRESTORE ==========

    // Busca ou cria usuário no Firestore
    async function getOrCreateUser(uid, email) {
      const userRef = doc(db, 'users', uid);
      const userSnap = await getDoc(userRef);
      
      if (!userSnap.exists()) {
        const today = new Date().toISOString().split('T')[0];
        await setDoc(userRef, {
          email: email,
          tier: 'normal', // normal, premium, admin
          searchLimit: 50,
          searchesToday: 0,
          lastResetDate: today,
          createdAt: new Date().toISOString()
        });
        return { uid, email, tier: 'normal', searchLimit: 50, searchesToday: 0, lastResetDate: today };
      }
      
      return { uid, ...userSnap.data() };
    }

    // Busca dados do usuário
    async function getUserData(uid) {
      const userRef = doc(db, 'users', uid);
      const userSnap = await getDoc(userRef);
      if (userSnap.exists()) {
        return { uid, ...userSnap.data() };
      }
      return null;
    }

    // Verifica se é admin
    async function checkIsAdmin(uid) {
      const data = await getUserData(uid);
      return data?.tier === 'admin';
    }

    // Verifica se pode buscar (com reset automático e transação)
    async function canSearch(uid) {
      const userRef = doc(db, 'users', uid);
      const today = new Date().toISOString().split('T')[0];
      
      try {
        const result = await runTransaction(db, async (transaction) => {
          const userSnap = await transaction.get(userRef);
          if (!userSnap.exists()) return { canSearch: false, reason: 'Usuário não existe' };
          
          const data = userSnap.data();
          const limit = data.tier === 'premium' ? 100 : data.tier === 'admin' ? 999999 : 50;
          let searchesToday = data.searchesToday || 0;
          let lastReset = data.lastResetDate || today;
          
          // Reset se for dia novo
          if (lastReset !== today) {
            searchesToday = 0;
            transaction.update(userRef, {
              searchesToday: 0,
              lastResetDate: today,
              searchLimit: limit
            });
            return { canSearch: true, limit, searchesToday: 0 };
          }
          
          // Verifica limite
          if (searchesToday >= limit) {
            return { canSearch: false, limit, searchesToday };
          }
          
          return { canSearch: true, limit, searchesToday };
        });
        
        return result;
      } catch (error) {
        console.error('Erro na transação:', error);
        return { canSearch: false, reason: 'Erro ao verificar limite' };
      }
    }

    // Incrementa busca (com transação)
    async function incrementSearch(uid) {
      const userRef = doc(db, 'users', uid);
      const today = new Date().toISOString().split('T')[0];
      
      try {
        const result = await runTransaction(db, async (transaction) => {
          const userSnap = await transaction.get(userRef);
          if (!userSnap.exists()) throw new Error('Usuário não existe');
          
          const data = userSnap.data();
          const limit = data.tier === 'premium' ? 100 : data.tier === 'admin' ? 999999 : 50;
          let searchesToday = data.searchesToday || 0;
          let lastReset = data.lastResetDate || today;
          
          // Reset se for dia novo
          if (lastReset !== today) {
            searchesToday = 1;
            transaction.update(userRef, {
              searchesToday: 1,
              lastResetDate: today,
              searchLimit: limit
            });
            return { searchesToday: 1, limit };
          }
          
          // Incrementa
          const newCount = searchesToday + 1;
          transaction.update(userRef, {
            searchesToday: newCount,
            searchLimit: limit
          });
          
          return { searchesToday: newCount, limit };
        });
        
        return result;
      } catch (error) {
        console.error('Erro ao incrementar:', error);
        throw error;
      }
    }

    // ========== FUNÇÕES ADMIN ==========

    // Buscar usuário por email
    async function findUserByEmail(email) {
      const usersRef = collection(db, 'users');
      const q = query(usersRef, where('email', '==', email));
      const querySnapshot = await getDocs(q);
      if (!querySnapshot.empty) {
        const docSnap = querySnapshot.docs[0];
        return { uid: docSnap.id, ...docSnap.data() };
      }
      return null;
    }

    // Definir tier de um usuário
    async function setUserTier(uid, tier) {
      const userRef = doc(db, 'users', uid);
      const limit = tier === 'premium' ? 100 : tier === 'admin' ? 999999 : 50;
      await updateDoc(userRef, {
        tier: tier,
        searchLimit: limit
      });
    }

    // Resetar buscas de um usuário
    async function resetUserSearches(uid) {
      const userRef = doc(db, 'users', uid);
      await updateDoc(userRef, {
        searchesToday: 0,
        lastResetDate: new Date().toISOString().split('T')[0]
      });
    }

    // ========== UPDATE UI ==========

    async function updateUI(uid) {
      const data = await getUserData(uid);
      if (data) {
        const today = new Date().toISOString().split('T')[0];
        const limit = data.tier === 'premium' ? 100 : data.tier === 'admin' ? 999999 : 50;
        let remaining = limit - (data.searchesToday || 0);
        
        if (data.lastResetDate !== today) {
          remaining = limit;
        }
        
        remaining = Math.max(0, remaining);
        searchRemaining.textContent = remaining;
        searchLimitEl.textContent = limit;
        
        if (remaining <= 0) {
          searchStatus.style.display = 'inline';
          searchBtn.disabled = true;
        } else {
          searchStatus.style.display = 'none';
          searchBtn.disabled = false;
        }
        
        userEmailEl.textContent = data.email;
      }
    }

    // ========== RENDERIZA RESULTADOS ==========

    function renderMessages(messages, authorId) {
      if (!messages || messages.length === 0) {
        return `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>Nenhuma mensagem encontrada</h3>
            <p>Para o ID ${authorId}</p>
          </div>
        `;
      }

      let html = `<div style="margin-bottom:1rem;color:#666;font-size:0.8rem;">📬 <span style="color:#ff0000;">${messages.length}</span> mensagens encontradas</div>`;

      messages.forEach((msg, index) => {
        const authorName = msg.author_name || `User${String(index + 1).padStart(2, '0')}`;
        const initial = authorName.charAt(0).toUpperCase();
        const isNew = msg.created_at && (new Date() - new Date(msg.created_at)) < 86400000;
        const badgeText = isNew ? '🆕 Nova' : '📌 Antiga';
        const badgeStyle = isNew ? 'background:#1a3300;color:#66ff66;border-color:#336600;' : 'background:#1a1a1a;color:#666;border-color:#333;';

        html += `
          <div class="msg-card">
            <div style="display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap;">
              <span class="msg-avatar">${initial}</span>
              <span class="msg-author">${authorName}</span>
              <span style="color:#555;font-size:0.7rem;">#${msg.author_id || authorId}</span>
              ${msg.thread_title ? `<span style="color:#ffaa00;font-size:0.75rem;background:rgba(255,170,0,0.08);padding:0.1rem 0.6rem;border-radius:4px;border:1px solid rgba(255,170,0,0.15);">📂 ${msg.thread_title}</span>` : ''}
              <span style="font-size:0.6rem;padding:0.15rem 0.6rem;border-radius:12px;${badgeStyle}">${badgeText}</span>
              <span class="msg-date">${msg.created_at || 'Data desconhecida'}</span>
            </div>
            <div class="msg-content">${(msg.content || 'Sem conteúdo').replace(/\n/g, '<br>').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
            <div style="margin-top:0.3rem;display:flex;gap:1rem;font-size:0.65rem;color:#444;">
              <span>📎 ID: ${msg.id || 'N/A'}</span>
              ${msg.channel_id ? `<span>📢 Canal: ${msg.channel_id}</span>` : ''}
            </div>
          </div>
        `;
      });

      return html;
    }

    // ========== LOGOUT ==========

    logoutBtn.onclick = async () => {
      try {
        await signOut(auth);
        window.location.href = "/";
      } catch (error) {
        console.error("Erro ao sair:", error);
        alert("Falha ao sair. Tenta de novo.");
      }
    };

    // ========== SEARCH ==========

    searchBtn.onclick = async () => {
      if (!currentUser) {
        resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">🔒</div><h3>Faça login primeiro</h3></div>`;
        return;
      }

      const now = Date.now();
      if (now - lastSearchTime < RATE_LIMIT_MS) {
        const remaining = Math.ceil((RATE_LIMIT_MS - (now - lastSearchTime)) / 1000);
        resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><h3>Aguarde ${remaining} segundos</h3></div>`;
        return;
      }

      const authorId = authorInput.value.trim();
      if (!authorId || !/^\d{17,19}$/.test(authorId)) {
        resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">❌</div><h3>ID inválido</h3><p>Digite um Discord ID válido (17-19 dígitos)</p></div>`;
        return;
      }

      // Verifica limite
      const check = await canSearch(currentUser.uid);
      if (!check.canSearch) {
        resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">🚫</div><h3>Limite diário excedido</h3><p>Volte amanhã!</p></div>`;
        await updateUI(currentUser.uid);
        return;
      }

      lastSearchTime = now;
      resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><h3>Buscando...</h3></div>`;
      infoP.textContent = "";

      try {
        // Incrementa contador
        await incrementSearch(currentUser.uid);
        await updateUI(currentUser.uid);

        // Faz a busca na API
        const params = new URLSearchParams({
          author_id: authorId,
          limit: 100
        });
        if (keywordInput.value.trim()) {
          params.append("keyword", keywordInput.value.trim());
        }

        const response = await fetch(`https://scraper.whbf.cc/api/search?${params}`, {
          method: "GET",
          headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
          throw new Error(`Erro ${response.status}: ${await response.text()}`);
        }

        const data = await response.json();
        resultsDiv.innerHTML = renderMessages(data, authorId);
        infoP.textContent = `Mostrando ${data.length} mensagens • ${new Date().toLocaleString()}`;

      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">❌</div><h3>Erro ao buscar</h3><p>${err.message}</p></div>`;
      }
    };

    // ========== ADMIN ==========

    setTierBtn.onclick = async () => {
      if (!currentUser || !isAdmin) {
        alert('⚠️ Apenas administradores podem fazer isso');
        return;
      }

      const email = adminEmail.value.trim();
      const tier = adminTier.value.trim().toLowerCase();
      
      if (!email || !['normal', 'premium', 'admin'].includes(tier)) {
        alert('Preencha email e tier (normal, premium ou admin)');
        return;
      }

      try {
        const user = await findUserByEmail(email);
        if (!user) {
          alert('Usuário não encontrado');
          return;
        }

        await setUserTier(user.uid, tier);
        alert(`✅ Tier atualizado para ${email}: ${tier}`);
        
        if (currentUser.uid === user.uid) {
          await updateUI(currentUser.uid);
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('❌ Erro ao definir tier');
      }
    };

    resetUserBtn.onclick = async () => {
      if (!currentUser || !isAdmin) {
        alert('⚠️ Apenas administradores podem fazer isso');
        return;
      }

      const email = adminEmail.value.trim();
      if (!email) {
        alert('Digite o email do usuário');
        return;
      }

      try {
        const user = await findUserByEmail(email);
        if (!user) {
          alert('Usuário não encontrado');
          return;
        }

        await resetUserSearches(user.uid);
        alert(`✅ Buscas resetadas para ${email}`);
        
        if (currentUser.uid === user.uid) {
          await updateUI(currentUser.uid);
        }
      } catch (error) {
        console.error('Erro:', error);
        alert('❌ Erro ao resetar buscas');
      }
    };

    // ========== AUTH STATE ==========

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        await getOrCreateUser(user.uid, user.email);
        isAdmin = await checkIsAdmin(user.uid);
        await updateUI(user.uid);
        
        if (isAdmin) {
          adminSection.style.display = 'block';
        }
      } else {
        window.location.href = "/";
      }
    });

    // ========== ENTER KEY ==========

    authorInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchBtn.click();
    });
    keywordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchBtn.click();
    });

    console.log('✅ WHBF DMS com Firestore + limites por tier carregado!');
  </script>
