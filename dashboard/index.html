<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHBF DMS - Pesquisador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(180, 40, 40, 0.25);
            border-radius: 16px;
            padding: 2rem;
            max-width: 1000px;
            width: 100%;
            box-shadow: 0 0 60px rgba(180, 40, 40, 0.06);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(180, 40, 40, 0.1);
        }

        .title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #fff;
        }
        .title span { color: #cc3333; font-weight: 500; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
            color: #888;
        }
        .user-email { color: #ccc; }
        .user-tier {
            background: rgba(180, 40, 40, 0.15);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #cc3333;
            border: 1px solid rgba(180, 40, 40, 0.2);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            background: rgba(180, 40, 40, 0.08);
            border-color: rgba(180, 40, 40, 0.3);
            color: #cc3333;
        }

        .search-counter {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 1.5rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .search-counter .count { color: #cc3333; font-weight: 500; }
        .search-counter .divider { color: #333; }

        .search-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .search-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            flex: 1;
            min-width: 180px;
            font-family: inherit;
        }
        .search-input:focus {
            outline: none;
            border-color: rgba(180, 40, 40, 0.4);
            background: rgba(0, 0, 0, 0.8);
        }
        .search-input::placeholder { color: #444; }

        .btn-search {
            background: rgba(180, 40, 40, 0.12);
            border: 1px solid rgba(180, 40, 40, 0.25);
            color: #e0e0e0;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s ease;
            font-family: inherit;
        }
        .btn-search:hover:not(:disabled) {
            background: rgba(180, 40, 40, 0.2);
            border-color: rgba(180, 40, 40, 0.4);
            transform: translateY(-1px);
        }
        .btn-search:disabled { opacity: 0.3; cursor: not-allowed; }

        #results {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 1.2rem;
            min-height: 350px;
            max-height: 50vh;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        #results::-webkit-scrollbar { width: 5px; }
        #results::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 8px; }
        #results::-webkit-scrollbar-thumb { background: rgba(180, 40, 40, 0.25); border-radius: 8px; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: #444;
            text-align: center;
        }
        .empty-state .icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.2; }
        .empty-state h3 { font-weight: 300; color: #555; font-size: 1rem; }
        .empty-state p { font-size: 0.8rem; color: #333; }

        .msg-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.6rem;
            transition: all 0.2s ease;
        }
        .msg-card:hover {
            border-color: rgba(180, 40, 40, 0.15);
            background: rgba(0, 0, 0, 0.5);
        }
        .msg-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.3rem 0.8rem;
            margin-bottom: 0.3rem;
            font-size: 0.75rem;
        }
        .msg-author { color: #cc3333; font-weight: 500; }
        .msg-server { color: #888; }
        .msg-channel { color: #666; }
        .msg-date { color: #444; font-size: 0.6rem; margin-left: auto; white-space: nowrap; }
        .msg-content { color: #d0d0d0; font-size: 0.85rem; white-space: pre-wrap; word-break: break-word; }
        .msg-footer { margin-top: 0.3rem; display: flex; gap: 1rem; font-size: 0.55rem; color: #3a3a3a; }

        .loading-spinner {
            border: 2px solid rgba(180, 40, 40, 0.08);
            border-top: 2px solid rgba(180, 40, 40, 0.4);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.9s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: #444;
        }

        #result-info {
            text-align: right;
            margin-top: 0.5rem;
            color: #333;
            font-size: 0.7rem;
        }

        /* Paginação */
        .pagination {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 0.3rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .pagination button {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #888;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
            font-family: inherit;
            min-width: 32px;
            text-align: center;
        }
        .pagination button:hover:not(:disabled) {
            background: rgba(180, 40, 40, 0.15);
            border-color: rgba(180, 40, 40, 0.3);
            color: #cc3333;
        }
        .pagination button.active {
            background: rgba(180, 40, 40, 0.2);
            border-color: rgba(180, 40, 40, 0.4);
            color: #cc3333;
            font-weight: 600;
        }
        .pagination button:disabled { opacity: 0.2; cursor: not-allowed; }
        .pagination .page-info { color: #444; font-size: 0.7rem; padding: 0 0.3rem; }
        .pagination .page-jump {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            margin-left: 0.3rem;
        }
        .pagination .page-jump input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            padding: 0.2rem 0.3rem;
            border-radius: 4px;
            width: 40px;
            font-size: 0.7rem;
            text-align: center;
            font-family: inherit;
        }
        .pagination .page-jump input:focus {
            outline: none;
            border-color: rgba(180, 40, 40, 0.4);
        }
        .pagination .page-jump button {
            padding: 0.2rem 0.5rem;
            font-size: 0.65rem;
            min-width: auto;
        }

        .snowflake {
            position: fixed;
            top: -10px;
            color: rgba(255, 255, 255, 0.04);
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 0;
            font-size: 12px;
        }
        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0deg); }
            to { transform: translateY(110vh) rotate(360deg); }
        }

        footer {
            margin-top: 2rem;
            padding: 1rem 0 0.3rem;
            text-align: center;
            color: #222;
            font-size: 0.65rem;
            letter-spacing: 2px;
        }

        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .title { font-size: 1.3rem; letter-spacing: 2px; }
            .search-row { flex-direction: column; }
            .btn-search { width: 100%; }
            .pagination button { padding: 0.2rem 0.4rem; font-size: 0.6rem; min-width: 26px; }
        }
    </style>
</head>
<body>

        <!-- HEADER -->

            <div class="user-info">

    <!-- NEVE -->
    <script>
        (function snow() {
            const flakes = [];
            let lastTime = performance.now();

            function createParticle() {
                const p = document.createElement('div');
                p.className = 'snowflake';
                p.style.left = Math.random() * window.innerWidth + 'px';
                p.style.fontSize = (Math.random() * 10 + 6) + 'px';
                p.innerText = '❄';
                document.body.appendChild(p);
                flakes.push({ el: p, y: -10, speed: Math.random() * 150 + 150 });
            }

            function update(time) {
                const delta = Math.min((time - lastTime) / 1000, 0.1);
                lastTime = time;
                if (Math.random() < delta * 30) createParticle();
                flakes.forEach((flake, i) => {
                    flake.y += flake.speed * delta;
                    flake.el.style.transform = `translateY(${flake.y}px)`;
                    if (flake.y > window.innerHeight + 200) {
                        flake.el.remove();
                        flakes.splice(i, 1);
                    }
                });
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        })();
    </script>

    <!-- FIREBASE + LÓGICA -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js",

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "firebase/firestore";

        // ===== CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyDXX5y50eUHJtFNa4S4r5LrBoPXpUKeGBQ",
            authDomain: "gsrgszsgz.firebaseapp.com",
            projectId: "gsrgszsgz",
            storageBucket: "gsrgszsgz.firebasestorage.app",
            messagingSenderId: "896231461425",
            appId: "1:896231461425:web:f5e1692a5d727ff1ed7b10"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ===== ELEMENTOS =====
        const resultsDiv = document.getElementById('results');
        const infoDiv = document.getElementById('result-info');
        const authorInput = document.getElementById('author-id');
        const keywordInput = document.getElementById('keyword');
        const searchBtn = document.getElementById('btn-search');
        const logoutBtn = document.getElementById('btn-logout');
        const userEmailEl = document.getElementById('user-email');
        const userTierEl = document.getElementById('user-tier');
        const searchRemaining = document.getElementById('search-remaining');
        const searchLimitEl = document.getElementById('search-limit');

        const paginationContainer = document.getElementById('pagination-container');
        const pageNumbers = document.getElementById('page-numbers');
        const pagePrev = document.getElementById('page-prev');
        const pageNext = document.getElementById('page-next');
        const pagePrev5 = document.getElementById('page-prev5');
        const pageNext5 = document.getElementById('page-next5');
        const pageFirst = document.getElementById('page-first');
        const pageLast = document.getElementById('page-last');
        const pageInfo = document.getElementById('page-info');
        const jumpInput = document.getElementById('page-jump-input');
        const jumpBtn = document.getElementById('page-jump-btn');

        // ===== VARIAVEIS =====
        let currentUser = null;
        let currentPage = 1;
        let totalPages = 0;
        let totalMessages = 0;
        let currentAuthorId = '';
        let currentKeyword = '';
        const PAGE_LIMIT = 100;
        const RATE_LIMIT_MS = 3000;
        let lastSearchTime = 0;
        const pageCache = new Map();

        // ===== API =====
        const API_URL = 'https://ge6c22a3518a389-dms.adb.eu-stockholm-1.oraclecloudapps.com/ords/admin/api/search';

        // ===== FUNÇÕES FIRESTORE =====
        async function getUserData(uid) {
            const ref = doc(db, 'users', uid);
            const snap = await getDoc(ref);
            return snap.exists() ? { uid, ...snap.data() } : null;
        }

        async function ensureUserExists(uid, email) {
            const ref = doc(db, 'users', uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                const today = new Date().toISOString().split('T')[0];
                await setDoc(ref, {
                    email,
                    tier: 'normal',
                    searchLimit: 50,
                    searchesToday: 0,
                    lastResetDate: today,
                    createdAt: new Date().toISOString()
                });
                return { uid, email, tier: 'normal', searchLimit: 50, searchesToday: 0, lastResetDate: today };
            }
            return { uid, ...snap.data() };
        }

        async function canSearch(uid) {
            const data = await getUserData(uid);
            if (!data) return { canSearch: false, limit: 0, used: 0, remaining: 0 };
            const today = new Date().toISOString().split('T')[0];
            const limit = data.searchLimit || 50;
            let used = data.searchesToday || 0;
            if (data.lastResetDate !== today) {
                await updateDoc(doc(db, 'users', uid), { searchesToday: 0, lastResetDate: today });
                used = 0;
            }
            const remaining = Math.max(0, limit - used);
            return { canSearch: remaining > 0, limit, used, remaining };
        }

        async function incrementSearch(uid) {
            const ref = doc(db, 'users', uid);
            await updateDoc(ref, { searchesToday: increment(1) });
            const data = await getUserData(uid);
            return { searchesToday: data.searchesToday, limit: data.searchLimit };
        }

        // ===== UI =====
        async function updateUI(uid) {
            const data = await getUserData(uid);
            if (data) {
                const today = new Date().toISOString().split('T')[0];
                const limit = data.searchLimit || 50;
                let used = data.searchesToday || 0;
                if (data.lastResetDate !== today) used = 0;
                const remaining = Math.max(0, limit - used);
                userEmailEl.textContent = data.email || '—';
                userTierEl.textContent = (data.tier || 'normal').toUpperCase();
                searchRemaining.textContent = remaining;
                searchLimitEl.textContent = limit;
                searchBtn.disabled = remaining <= 0;
            }
        }

        // ===== RENDER =====
        function renderMessages(items) {
            if (!items || items.length === 0) {
                return `<div class="empty-state"><div class="icon">◇</div><h3>Nenhuma mensagem</h3><p>Tente outro ID</p></div>`;
            }
            let html = `<div style="display:flex;justify-content:space-between;margin-bottom:0.8rem;font-size:0.7rem;color:#555;">
                <span>${items.length} mensagens</span>
            </div>`;
            items.forEach((msg, idx) => {
                html += `
                <div class="msg-card">
                    <div class="msg-header">
                        <span class="msg-author">${escapeHtml(msg.author || 'Desconhecido')}</span>
                        <span class="msg-server">${escapeHtml(msg.server || 'Servidor')}</span>
                        <span style="color:#333;">›</span>
                        <span class="msg-channel">${escapeHtml(msg.channel || 'Canal')}</span>
                        <span class="msg-date">${formatDate(msg.created_at)}</span>
                    </div>
                    <div class="msg-content">${escapeHtml(msg.content || '')}</div>
                    <div class="msg-footer">
                        <span>ID: ${msg.message_id || msg.id || '—'}</span>
                    </div>
                </div>
                `;
            });
            return html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const el = document.createElement('div');
            el.textContent = text;
            return el.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr);
                return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit',
                    minute: '2-digit' });
            } catch { return dateStr; }
        }

        // ===== PAGINAÇÃO =====
        function renderPagination(page, totalPages, totalMessages) {
            if (totalPages <= 1) {
                paginationContainer.style.display = 'none';
                return;
            }
            paginationContainer.style.display = 'flex';
            pageInfo.textContent = `${totalMessages} msgs • ${page}/${totalPages}`;
            jumpInput.max = totalPages;
            jumpInput.value = page;

            pagePrev.disabled = page <= 1;
            pageNext.disabled = page >= totalPages;
            pagePrev5.disabled = page <= 5;
            pageNext5.disabled = page > totalPages - 5;
            pageFirst.disabled = page <= 1;
            pageLast.disabled = page >= totalPages;

            pageNumbers.innerHTML = '';
            let start = Math.max(1, page - 2);
            let end = Math.min(totalPages, page + 2);
            if (end - start < 4) {
                if (start > 1) start = Math.max(1, end - 4);
                if (end < totalPages) end = Math.min(totalPages, start + 4);
            }
            if (start > 1) {
                pageNumbers.appendChild(createPageBtn(1));
                if (start > 2) { const d = document.createElement('span');
                    d.textContent = '…';
                    d.style.color = '#444';
                    d.style.padding = '0 0.2rem';
                    pageNumbers.appendChild(d); }
            }
            for (let i = start; i <= end; i++) {
                const btn = createPageBtn(i);
                if (i === page) btn.classList.add('active');
                pageNumbers.appendChild(btn);
            }
            if (end < totalPages) {
                if (end < totalPages - 1) { const d = document.createElement('span');
                    d.textContent = '…';
                    d.style.color = '#444';
                    d.style.padding = '0 0.2rem';
                    pageNumbers.appendChild(d); }
                pageNumbers.appendChild(createPageBtn(totalPages));
            }
        }

        function createPageBtn(num) {
            const btn = document.createElement('button');
            btn.textContent = num;
            btn.addEventListener('click', () => { if (num !== currentPage) loadPage(num); });
            return btn;
        }

        // ===== CARREGAR PÁGINA =====
        async function loadPage(page) {
            if (!currentUser || page < 1 || page > totalPages) return;

            const cacheKey = `${currentAuthorId}_${currentKeyword}_${page}`;
            if (pageCache.has(cacheKey)) {
                const cached = pageCache.get(cacheKey);
                currentPage = page;
                resultsDiv.innerHTML = renderMessages(cached.items);
                renderPagination(currentPage, totalPages, totalMessages);
                infoDiv.textContent = `Página ${page}/${totalPages} [cache]`;
                return;
            }

            const offset = (page - 1) * PAGE_LIMIT;
            currentPage = page;
            resultsDiv.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div><div class="text">Carregando página ${page}...</div></div>`;

            try {
                const params = new URLSearchParams();
                if (currentAuthorId) params.append('author_id', currentAuthorId);
                if (currentKeyword) params.append('keyword', currentKeyword);
                params.append('limit', PAGE_LIMIT);
                params.append('offset', offset);
                const response = await fetch(`${API_URL}?${params.toString()}`, {
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const items = data.items || [];
                if (items.length === 0 && page > 1) { loadPage(page - 1); return; }

                pageCache.set(cacheKey, { items });
                currentPage = page;
                resultsDiv.innerHTML = renderMessages(items);
                renderPagination(currentPage, totalPages, totalMessages);
                infoDiv.textContent = `Página ${page}/${totalPages}`;
            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">✗</div><h3>Erro</h3><p>${escapeHtml(error.message)}</p></div>`;
            }
        }

        // ===== BUSCA =====
        async function performSearch() {
            if (!currentUser) return;
            const authorId = authorInput.value.trim();
            const keyword = keywordInput.value.trim();
            if (!authorId && !keyword) {
                resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">◈</div><h3>Informe um ID</h3></div>`;
                paginationContainer.style.display = 'none';
                return;
            }

            const now = Date.now();
            if (now - lastSearchTime < RATE_LIMIT_MS) {
                const wait = Math.ceil((RATE_LIMIT_MS - (now - lastSearchTime)) / 1000);
                resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">⏱</div><h3>Aguarde ${wait}s</h3></div>`;
                return;
            }

            const check = await canSearch(currentUser.uid);
            if (!check.canSearch) {
                resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">⊘</div><h3>Limite diário atingido</h3><p>${check.used}/${check.limit}</p></div>`;
                await updateUI(currentUser.uid);
                return;
            }

            lastSearchTime = now;
            await incrementSearch(currentUser.uid);
            await updateUI(currentUser.uid);

            pageCache.clear();
            currentAuthorId = authorId;
            currentKeyword = keyword;
            currentPage = 1;
            totalMessages = 0;
            totalPages = 0;

            resultsDiv.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div><div class="text">Buscando...</div></div>`;

            try {
                const params = new URLSearchParams();
                params.append('author_id', authorId);
                if (keyword) params.append('keyword', keyword);
                params.append('limit', PAGE_LIMIT);
                params.append('offset', 0);
                const response = await fetch(`${API_URL}?${params.toString()}`, {
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const items = data.items || [];
                const count = data.count || items.length;

                if (items.length === 0) {
                    resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">◇</div><h3>Nenhuma mensagem</h3></div>`;
                    paginationContainer.style.display = 'none';
                    return;
                }

                // 🔥 CORREÇÃO: Se recebemos 100 mensagens, assumimos que há mais páginas
                const hasMore = items.length === PAGE_LIMIT;
                const totalFromApi = count;
                
                // Se a API devolveu 100 e tem mais, usamos um número estimado
                if (hasMore && totalFromApi <= PAGE_LIMIT) {
                    // Estimativa: se há mais, assumimos pelo menos 2 páginas
                    totalMessages = PAGE_LIMIT + 1; // Força a ter mais páginas
                } else {
                    totalMessages = totalFromApi > 0 ? totalFromApi : items.length;
                }

                totalPages = Math.ceil(totalMessages / PAGE_LIMIT);
                
                // Se há mais páginas mas o totalPages é 1, forçamos 2
                if (hasMore && totalPages <= 1) {
                    totalPages = 2;
                    totalMessages = PAGE_LIMIT * 2;
                }

                pageCache.set(`${authorId}_${keyword}_1`, { items });

                resultsDiv.innerHTML = renderMessages(items);
                renderPagination(1, totalPages, totalMessages);
                infoDiv.textContent = `${items.length} mensagens • Página 1/${totalPages}`;
                
                // Se houver mais páginas, carrega a página 2 em background (opcional)
                if (totalPages > 1) {
                    console.log(`📄 Página 2 disponível. Use os botões para navegar.`);
                }

            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = `<div class="empty-state"><div class="icon">✗</div><h3>Erro na busca</h3><p>${escapeHtml(error.message)}</p></div>`;
                paginationContainer.style.display = 'none';
            }
        }

        // ===== EVENTOS =====
        searchBtn.addEventListener('click', performSearch);
        authorInput.addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
        keywordInput.addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });

        pagePrev.addEventListener('click', () => { if (currentPage > 1) loadPage(currentPage - 1); });
        pageNext.addEventListener('click', () => { if (currentPage < totalPages) loadPage(currentPage + 1); });
        pagePrev5.addEventListener('click', () => { loadPage(Math.max(1, currentPage - 5)); });
        pageNext5.addEventListener('click', () => { loadPage(Math.min(totalPages, currentPage + 5)); });
        pageFirst.addEventListener('click', () => loadPage(1));
        pageLast.addEventListener('click', () => loadPage(totalPages));
        jumpBtn.addEventListener('click', () => {
            const p = parseInt(jumpInput.value);
            if (p >= 1 && p <= totalPages) loadPage(p);
        });
        jumpInput.addEventListener('keypress', e => { if (e.key === 'Enter') jumpBtn.click(); });

        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = '/';
        });

        // ===== AUTH =====
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await ensureUserExists(user.uid, user.email);
                await updateUI(user.uid);
                console.log('✅ Logado:', user.email);
            } else {
                window.location.href = '/';
            }
        });

        console.log('🔍 WHBF DMS carregado!');
    </script>

</body>
</html>
